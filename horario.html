<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Horario semanal cozy</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrapper">
    <header class="header">
      <h1>📖 Horario semanal</h1>
      <div id="weekInfo" class="week-info">
        <div class="calendar-card">
          <div class="calendar-top" id="weekMonth">MAYO 2026</div>
          <div class="calendar-days" id="weekDays">-- → --</div>
          <div class="calendar-text" id="weekText">Cargando...</div>
        </div>
      </div>
    </header>
    <section class="agenda">
      <div id="weekGrid" class="week-grid"></div>
      <div class="footer-note">✨ Actualizado con mucho mimo ✨</div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
