<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horario semanal cozy</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrapper">
    <header class="header">
      <h1>📖 Horario semanal</h1>
      <p>Estudio y descansos</p>
      <div id="weekInfo" class="week-info">
        <div class="calendar-card">
          <div class="calendar-top" id="weekMonth">MES</div>
          <div class="calendar-days" id="weekDays">-- → --</div>
          <div class="calendar-text" id="weekText">Semana actual</div>
        </div>
      </div>
    </header>
    <section class="agenda">
      <div class="sticker one">🌿</div>
      <div class="sticker two">☕</div>
      <div class="sticker three">📚</div>
      <div id="weekGrid" class="week-grid"></div>
      <div class="notes-section">
        <div class="notes-paper">
          <h3>📌 Notas y Avisos Generales</h3>
          <ul id="notesList"></ul>
        </div>
      </div>
      <div class="footer-note">✨ Actualizado con mucho mimo ✨</div>
      <div id="lastUpdate" class="last-update"></div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
